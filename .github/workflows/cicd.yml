name: cicd

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: cicd-main
  cancel-in-progress: true

jobs:
  build-and-push:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}
      owner: ${{ steps.lower.outputs.owner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Repository owner lowercase
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set image metadata
        id: meta
        run: echo "image=ghcr.io/${{ steps.lower.outputs.owner }}/ion-backend:latest" >> $GITHUB_OUTPUT

      - name: Log in GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << EOF
            set -e

            echo "Pulling image: $IMAGE"
            docker pull $IMAGE

            echo "Stopping container..."
            docker stop ion-backend || true
            docker rm ion-backend || true

            echo "Starting new container..."
            docker run -d --name ion-backend \
              --network ion-net \
              -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
              -e ION_JWT_SECRET=${{ secrets.ION_JWT_SECRET }} \
              -e ION_LLM_BASE_URL=${{ secrets.ION_LLM_BASE_URL }} \
              -e ION_LLM_API_KEY=${{ secrets.ION_LLM_API_KEY }} \
              -p 80:8080 \
              $IMAGE
          EOF
