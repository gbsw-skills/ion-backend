name: cicd

on:
  push:
    branches: [main]

concurrency:
  group: cicd-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ion-backend:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << EOF
            set -e

            IMAGE="${{ needs.build-and-push.outputs.image }}"

            echo "Pulling image: $IMAGE"
            docker pull $IMAGE

            echo "Stopping container..."
            docker stop ion-backend || true
            docker rm ion-backend || true

            echo "Starting new container..."
            docker run -d --name ion-backend \
              --network ion-net \
              -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
              -e ION_JWT_SECRET=${{ secrets.ION_JWT_SECRET }} \
              -e ION_LLM_BASE_URL=${{ secrets.ION_LLM_BASE_URL }} \
              -e ION_LLM_API_KEY=${{ secrets.ION_LLM_API_KEY }} \
              -p 80:8080 \
              $IMAGE
          EOF
