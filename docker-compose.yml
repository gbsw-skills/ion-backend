services:
  postgres:
    image: postgres:16
    container_name: ion-postgres
    environment:
      POSTGRES_DB: ion
      POSTGRES_USER: ion
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ion"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
