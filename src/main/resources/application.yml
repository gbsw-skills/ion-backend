spring:
  main:
    web-application-type: servlet

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ion}
    username: ${SPRING_DATASOURCE_USERNAME:ion}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

ion:
  jwt:
    secret: ${ION_JWT_SECRET:ion-default-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-expiry: ${ION_JWT_ACCESS_EXPIRY:900}
    refresh-expiry: ${ION_JWT_REFRESH_EXPIRY:1209600}

  llm:
    bootstrap:
      name: ${ION_LLM_BOOTSTRAP_NAME:default-ollama}
      base-url: ${ION_LLM_BOOTSTRAP_BASE_URL:http://localhost:11434}
      api-key: ${ION_LLM_BOOTSTRAP_API_KEY:ollama}
      model: ${ION_LLM_BOOTSTRAP_MODEL:ion-model}
      system-prompt: ${ION_LLM_BOOTSTRAP_SYSTEM_PROMPT:당신은 경북소마고 전용 AI 어시스턴트 Ion입니다. 학교 공지사항과 학사 정보를 바탕으로 학생과 교직원을 돕습니다. 항상 한국어로 답변하세요.}
      temperature: ${ION_LLM_BOOTSTRAP_TEMPERATURE:0.7}
      max-tokens: ${ION_LLM_BOOTSTRAP_MAX_TOKENS:1024}

  storage:
    documents-dir: ${ION_DOCUMENTS_DIR:./storage/documents}

server:
  port: 8080

logging:
  level:
    com.ion: INFO
    org.springframework.security: WARN
